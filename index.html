<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆测试执行看板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --gray: #bdc3c7; --green: #2ecc71; --red: #e74c3c; --blue: #3498db;
        }
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        
        /* 看板布局 */
        #kanban { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        
        /* 工况卡片样式 */
        .card {
            background: white; border-radius: 12px; padding: 15px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s;
            border-top: 8px solid var(--gray); cursor: pointer;
        }
        .card.testing { border-top-color: var(--blue); animation: blink 1s infinite; }
        .card.pass { border-top-color: var(--green); }
        .card.fail { border-top-color: var(--red); }
        .card h4 { margin: 5px 0; font-size: 16px; color: #333; }
        .card p { font-size: 12px; color: #7f8c8d; margin: 5px 0; }
        .comment-text { font-style: italic; font-size: 11px; color: #555; margin-top: 8px; border-top: 1px solid #eee; padding-top: 5px; }

        @keyframes blink { 50% { opacity: 0.6; } }
        
        button { padding: 10px 15px; border-radius: 8px; border: none; background: var(--blue); color: white; cursor: pointer; }
        #exportBtn { background: var(--green); display: none; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="file" id="csvFile" accept=".csv" style="display:none">
        <button onclick="document.getElementById('csvFile').click()">加载测试工况 (CSV)</button>
        <button id="exportBtn" onclick="exportResults()">导出测试结果</button>
    </div>

    <div id="kanban">
        </div>

<script>
    let testData = [];

    // 1. 加载并解析 CSV
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                testData = results.data.map(item => ({
                    ...item,
                    status: 'pending', // pending, testing, completed
                    comment: ''
                }));
                renderKanban();
                document.getElementById('exportBtn').style.display = 'block';
            }
        });
    });

    // 2. 渲染看板
    function renderKanban() {
        const container = document.getElementById('kanban');
        container.innerHTML = '';
        testData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = `card ${item.status === 'testing' ? 'testing' : ''} ${item.status === 'completed' ? (item.comment.toLowerCase() === 'pass' ? 'pass' : 'fail') : ''}`;
            
            card.innerHTML = `
                <p>${item.测试场地 || '未知场地'}</p>
                <h4>${item.测试工况}</h4>
                <p>计划次数: ${item.测试次数}</p>
                ${item.comment ? `<div class="comment-text">备注: ${item.comment}</div>` : ''}
            `;

            card.onclick = () => handleCardClick(index);
            container.appendChild(card);
        });
    }

    // 3. 点击逻辑处理
    function handleCardClick(index) {
        const item = testData[index];

        if (item.status === 'pending') {
            // 开始测试
            item.status = 'testing';
        } else if (item.status === 'testing') {
            // 测试结束，输入结果
            const res = prompt("测试结束，请输入 Comment (输入 'pass' 变绿，其他变红):", "pass");
            if (res !== null) {
                item.comment = res;
                item.status = 'completed';
            }
        } else {
            // 已完成，查看/修改备注
            const res = prompt("当前备注如下，如需修改请输入:", item.comment);
            if (res !== null) item.comment = res;
        }
        renderKanban();
    }

    // 4. 导出 CSV
    function exportResults() {
        const outputData = testData.map(item => {
            const { status, ...rest } = item; // 移除内部状态字段
            return rest;
        });
        const csv = Papa.unparse(outputData);
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `测试结果_${new Date().getTime()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
