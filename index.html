<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>车辆测试极致版 v7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --bg: #f2f2f7; --card-bg: #ffffff;
            --pass: #34c759; --fail: #ff3b30;
            --text-main: #1c1c1e; --text-sec: #8e8e93;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 8px; color: var(--text-main); }
        
        .header { background: white; padding: 8px 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .btn-group { display: flex; gap: 6px; width: 100%; }
        
        #kanban { display: flex; flex-direction: column; gap: 4px; }
        
        .card {
            background: var(--card-bg); border-radius: 6px; padding: 6px 10px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
            border-left: 4px solid #d1d1d6;
            min-height: 36px;
        }
        
        .card.status-pass { border-left-color: var(--pass); background-color: #f2fff5; }
        .card.status-fail { border-left-color: var(--fail); background-color: #fff2f2; }
        .card:active { background-color: #e5e5ea; }

        .venue-tag {
            font-size: 11px; font-weight: 800; color: white;
            padding: 2px 6px; border-radius: 3px; min-width: 48px; text-align: center;
            margin-right: 10px; flex-shrink: 0;
        }
        
        .condition-name {
            flex-grow: 1; font-size: 13px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-right: 8px;
        }
        
        .plan-count { font-size: 10px; color: var(--text-sec); flex-shrink: 0; }

        button { padding: 8px 12px; border-radius: 6px; border: none; font-weight: 600; font-size: 13px; }
        .btn-load { background: #007aff; color: white; flex: 1; }
        .btn-export { background: #ff9500; color: white; flex: 1.2; display: none; }
        .btn-reset { background: #8e8e93; color: white; padding: 8px; margin-left: 5px; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="btn-group">
            <button class="btn-load" onclick="document.getElementById('csvFile').click()">📂 加载/恢复</button>
            <button id="exportBtn" class="btn-export" onclick="exportResults()">💾 导出结果</button>
            <button class="btn-reset" onclick="resetAll()">🗑️</button>
        </div>
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <div id="kanban"></div>

<script>
    let testData = [];
    const STORAGE_KEY = 'VEHICLE_TEST_V7_DATA';

    function getNowFormat(isForFileName = false) {
        const d = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        if (isForFileName) {
            return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
        }
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    window.onload = () => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            testData = JSON.parse(saved);
            renderKanban();
            updateUI();
        }
    };

    function updateUI() {
        document.getElementById('exportBtn').style.display = testData.length > 0 ? 'block' : 'none';
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            Papa.parse(evt.target.result, {
                header: true, skipEmptyLines: true,
                transformHeader: h => h.trim().replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, ''),
                complete: function(results) {
                    testData = results.data.map(item => {
                        const commentCol = item['测试记录时间内容'] || item['所有备注'] || item['测试记录'] || "";
                        return {
                            venue: item['测试场地'] || item['场地'] || '未知',
                            condition: item['测试工况'] || item['工况'] || '未知',
                            count: item['测试次数'] || item['次数'] || '0',
                            comments: commentCol ? commentCol.split(' | ').filter(c => c.trim() !== "") : []
                        };
                    });
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(testData));
                    renderKanban();
                    updateUI();
                }
            });
        };
        reader.readAsText(file, 'GBK');
    });

    function renderKanban() {
        const container = document.getElementById('kanban');
        container.innerHTML = '';
        const colors = ['#5856d6', '#007aff', '#34aadc', '#ff9500', '#af52de', '#ff2d55', '#4cd964'];
        const venueColorMap = {};

        testData.forEach((item, index) => {
            if (!venueColorMap[item.venue]) {
                venueColorMap[item.venue] = colors[Object.keys(venueColorMap).length % colors.length];
            }
            const card = document.createElement('div');
            let statusClass = '';
            if (item.comments.length > 0) {
                statusClass = item.comments.some(c => c.toLowerCase().includes('pass')) ? 'status-pass' : 'status-fail';
            }
            card.className = `card ${statusClass}`;
            card.innerHTML = `
                <div class="venue-tag" style="background:${venueColorMap[item.venue]}">${item.venue}</div>
                <div class="condition-name">${item.condition}</div>
                <div class="plan-count">${item.count}次</div>
            `;
            card.onclick = () => {
                const history = item.comments.length > 0 ? `[历史记录]:\n${item.comments.join('\n')}\n\n` : "";
                const res = prompt(`${history}输入备注 (pass变绿):`, item.comments.length > 0 ? "" : "pass");
                if (res !== null && res.trim() !== "") {
                    item.comments.push(`[${getNowFormat()}] ${res.trim()}`);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(testData));
                    renderKanban();
                }
            };
            container.appendChild(card);
        });
    }

    function exportResults() {
        if (testData.length === 0) return;
        
        // 核心修改：询问车型
        const carModel = prompt("请输入测试车型名称 (将用于文件名和表格列):", "某车型A");
        if (carModel === null) return; // 用户取消导出

        const rows = testData.map(item => ({
            '测试车型': carModel,
            '测试场地': item.venue,
            '测试工况': item.condition,
            '测试次数': item.count,
            '测试记录时间内容': item.comments.join(' | ')
        }));

        const csv = Papa.unparse(rows);
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        const fileName = `${carModel.trim()}_${getNowFormat(true)}.csv`;
        
        a.href = URL.createObjectURL(blob);
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function resetAll() {
        if (confirm("确定重置吗？")) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }
</script>
</body>
</html>
